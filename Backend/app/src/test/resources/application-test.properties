spring.datasource.url=jdbc:h2:mem:centrovecinal;MODE=MariaDB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost/mock-jwks

app.attachments.storage-path=target/test-uploads

app.keycloak.admin.base-url=http://localhost:8080
app.keycloak.admin.realm=centro-vecinal
app.keycloak.admin.client-id=test-client
app.keycloak.admin.client-secret=test-secret
