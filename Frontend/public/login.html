<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Centro Vecinal Barrio Inaudi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ==========================================
       CSS Variables (Design Tokens)
       ========================================== */
    :root {
      --color-background: #0f172a;
      --color-foreground: #f8fafc;
      --color-card: #111827;
      --color-card-foreground: #f8fafc;
      --color-primary: #3b82f6;
      --color-primary-foreground: #ffffff;
      --color-secondary: #1e293b;
      --color-secondary-foreground: #f8fafc;
      --color-muted-foreground: #94a3b8;
      --color-border: #334155;
      --color-input: #334155;
      --color-ring: #3b82f6;
      --radius: 0.5rem;
      --font-sans: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ==========================================
       Base Reset & Typography
       ========================================== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
    }

    body {
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.625;
      font-weight: 400;
      color: var(--color-foreground);
      background-color: var(--color-background);
    }

    /* ==========================================
       Login Page Layout
       ========================================== */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* ==========================================
       Card Component
       ========================================== */
    .login-card {
      width: 100%;
      max-width: 28rem;
      background-color: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .login-card__header {
      text-align: center;
      padding: 1.5rem 1.5rem 1.5rem 1.5rem;
    }

    .login-card__logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      text-decoration: none;
    }

    .login-card__logo-icon {
      width: 2.5rem;
      height: 2.5rem;
      color: var(--color-primary);
    }

    .login-card__title {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.025em;
      color: var(--color-foreground);
      margin: 0;
    }

    .login-card__description {
      font-size: 15px;
      color: var(--color-muted-foreground);
      margin-top: 0.5rem;
    }

    .login-card__content {
      padding: 0 1.5rem;
    }

    .login-card__footer {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      padding: 0.5rem 1.5rem 1.5rem 1.5rem;
    }

    /* ==========================================
       Form Fields
       ========================================== */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .field__label {
      font-size: 0.875rem;
      font-weight: 500;
      line-height: 1;
      color: var(--color-foreground);
    }

    .field__input {
      width: 100%;
      height: 2.5rem;
      padding: 0 0.75rem;
      font-family: var(--font-sans);
      font-size: 0.875rem;
      line-height: 1.5;
      color: var(--color-foreground);
      background-color: var(--color-secondary);
      border: 1px solid var(--color-border);
      border-radius: calc(var(--radius) - 2px);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .field__input::placeholder {
      color: var(--color-muted-foreground);
    }

    .field__input:focus {
      border-color: var(--color-ring);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }

    /* ==========================================
       Button Component
       ========================================== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      height: 2.75rem;
      padding: 0 1rem;
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 500;
      line-height: 1;
      color: var(--color-primary-foreground);
      background-color: var(--color-primary);
      border: none;
      border-radius: calc(var(--radius) - 2px);
      cursor: pointer;
      transition: background-color 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover {
      background-color: #2563eb;
    }

    .btn:focus {
      outline: none;
      box-shadow: 0 0 0 2px var(--color-background), 0 0 0 4px var(--color-ring);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ==========================================
       Footer Text & Links
       ========================================== */
    .login-card__footer-text {
      font-size: 15px;
      color: var(--color-muted-foreground);
      text-align: center;
    }

    .login-card__link {
      color: var(--color-primary);
      font-weight: 500;
      text-decoration: none;
      transition: text-decoration 0.15s ease;
    }

    .login-card__link:hover {
      text-decoration: underline;
    }

    /* ==========================================
       SVG Icon (Building)
       ========================================== */
    .icon {
      display: inline-block;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-card__header">
        <a href="/" class="login-card__logo">
          <svg class="login-card__logo-icon icon" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="16" height="20" x="4" y="2" rx="2" ry="2"/>
            <path d="M9 22v-4h6v4"/>
            <path d="M8 6h.01"/>
            <path d="M16 6h.01"/>
            <path d="M12 6h.01"/>
            <path d="M12 10h.01"/>
            <path d="M12 14h.01"/>
            <path d="M16 10h.01"/>
            <path d="M16 14h.01"/>
            <path d="M8 10h.01"/>
            <path d="M8 14h.01"/>
          </svg>
        </a>
        <h1 class="login-card__title">Iniciar Sesión</h1>
        <p class="login-card__description">Ingresa tus credenciales para acceder al portal</p>
      </div>
      
      <form class="login-card__form" action="#" method="post">
        <div class="login-card__content">
          <div class="field-group">
            <div class="field">
              <label class="field__label" for="email">Email</label>
              <input 
                class="field__input" 
                type="email" 
                id="email" 
                name="email" 
                placeholder="tu@email.com" 
                required
              >
            </div>
            <div class="field">
              <label class="field__label" for="password">Contraseña</label>
              <input 
                class="field__input" 
                type="password" 
                id="password" 
                name="password" 
                placeholder="••••••••" 
                required
              >
            </div>
          </div>
        </div>
        
        <div class="login-card__footer">
          <button type="submit" class="btn">Ingresar</button>
          <p class="login-card__footer-text">
            ¿No tienes una cuenta? 
            <a href="/register" class="login-card__link">Registrarse</a>
          </p>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
